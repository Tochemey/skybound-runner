<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skybound Runner — powered by GoAkt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #5c94fc;
      --ground: #c84c0c;
      --brick: #b83c0c;
      --text: #fff;
      --panel: rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: #111;
    }
    body {
      display: grid;
      place-items: center;
    }
    .brand {
      position: fixed;
      top: 16px;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.2vw, 14px);
      line-height: 1.8;
      text-shadow: 3px 3px 0 #000;
      pointer-events: none;
    }
    .brand .sub {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.6;
      text-shadow: none;
    }
    #hud {
      position: fixed;
      top: 76px;
      left: 50%;
      z-index: 2;
      display: flex;
      gap: clamp(12px, 3vw, 36px);
      width: min(92vw, 1000px);
      justify-content: center;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1vw, 11px);
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }
    #stageName {
      position: fixed;
      top: 100px;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      font: clamp(7px, 0.8vw, 10px) 'Press Start 2P', monospace;
      letter-spacing: 1px;
      opacity: 0.9;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
    }
    #board {
      width: min(100vw, 133.333vh);
      height: auto;
      max-height: 100vh;
      background: var(--sky);
      border: 0;
      border-radius: 0;
      image-rendering: pixelated;
      box-shadow: 0 0 32px rgba(0,0,0,0.5);
    }
    .controls {
      position: fixed;
      bottom: 14px;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      font-size: clamp(9px, 1vw, 11px);
      color: #ddd;
      text-align: center;
      line-height: 1.8;
      text-shadow: 1px 1px 0 #000;
      white-space: nowrap;
      pointer-events: none;
    }
    #fullscreenBtn {
      position: fixed;
      z-index: 3;
      top: 14px;
      right: 14px;
      padding: 8px 10px;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 4px;
      background: rgba(0,0,0,0.45);
      cursor: pointer;
      font: 10px 'Press Start 2P', monospace;
    }
    #fullscreenBtn:hover { background: rgba(0,0,0,0.72); }
    #soundBtn {
      position: fixed;
      z-index: 3;
      top: 14px;
      right: 78px;
      padding: 8px 10px;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 4px;
      background: rgba(0,0,0,0.45);
      cursor: pointer;
      font: 10px 'Press Start 2P', monospace;
    }
    #soundBtn:hover { background: rgba(0,0,0,0.72); }
    kbd {
      background: #333; border: 1px solid #555; border-radius: 3px;
      padding: 2px 6px; font-size: 10px; color: #fff;
    }
    #status {
      position: fixed; bottom: 10px; left: 14px;
      z-index: 3;
      font-size: 10px; color: rgba(255,255,255,0.65); letter-spacing: 1px;
    }
    .overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .overlay .title {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px; line-height: 1.6;
      text-shadow: 4px 4px 0 #000;
    }
    .overlay .sub {
      margin-top: 16px; font-size: 12px; color: #ccc;
    }
    #winOverlay .title { color: #fbbf24; }
    #gameOverOverlay .title { color: #ef4444; }
    #pauseOverlay .title { color: #93c5fd; }
    #stageClearOverlay .title { color: #f8d878; }
  </style>
</head>
<body>
  <div class="brand">
    SKYBOUND RUNNER<br>
    <span class="sub">powered by GoAkt</span>
  </div>
  <div id="hud">
    <span>MARIO <span id="scoreVal">000000</span></span>
    <span>×<span id="coinsVal">00</span></span>
    <span>WORLD <span id="worldVal">1-1</span></span>
    <span>TIME <span id="timeVal">300</span></span>
    <span>LIVES <span id="livesVal">3</span></span>
  </div>
  <div id="stageName">MEADOW START</div>
  <canvas id="board" width="640" height="480"></canvas>
  <div class="controls">
    <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;
    <kbd>↑</kbd> / <kbd>Space</kbd> Jump &nbsp;
    <kbd>P</kbd> Pause &nbsp; <kbd>F</kbd> Fullscreen &nbsp; <kbd>M</kbd> Mute &nbsp;
    <kbd>R</kbd> Restart
  </div>
  <button id="fullscreenBtn" type="button" aria-label="Toggle fullscreen">FULL</button>
  <button id="soundBtn" type="button" aria-label="Toggle sound">SOUND</button>
  <div id="gameOverOverlay" class="overlay">
    <div class="title">GAME OVER</div>
    <div class="sub">Press <kbd>R</kbd> to restart</div>
  </div>
  <div id="winOverlay" class="overlay">
    <div class="title">CAMPAIGN COMPLETE!</div>
    <div class="sub">Press <kbd>R</kbd> to play again</div>
  </div>
  <div id="stageClearOverlay" class="overlay">
    <div class="title">STAGE CLEAR!</div>
    <div id="stageClearName" class="sub"></div>
  </div>
  <div id="pauseOverlay" class="overlay">
    <div class="title">PAUSED</div>
    <div class="sub">Press <kbd>P</kbd> to resume</div>
  </div>
  <div id="status">connecting…</div>
  <script src="main.js"></script>
</body>
</html>
